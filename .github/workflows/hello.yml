#Workflow
#Should have name
name: Hello

# On tells when the workflow should run (Give indentation by tab)
on:
  workflow_dispatch: 
#Job tells what the workflow should do , there can be one or more than one jobs,hence we write jobs
#Jobs is an object so need indentation

jobs: 
  #1st Job (give indentation)
  say-hello:
  #Create an Ephermal Container with Ubuntu running
    runs-on: ubuntu-latest
    # That ephermal container will have steps to execute, hence name those steps and use run: run has the command
    steps:
      - name: Say hello to everyone
        run: echo "Hello Dosto"
#Steps
#Should be inside the job

#Actions
#Should be inside the Steps
